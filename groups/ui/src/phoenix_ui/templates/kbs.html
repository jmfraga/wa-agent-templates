{% extends "_base.html" %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">Knowledge bases</h1>

<div class="bg-white rounded-lg border border-slate-200 shadow-sm overflow-hidden mb-6">
  <table class="w-full text-sm">
    <thead class="bg-slate-50 text-slate-600 text-xs uppercase">
      <tr><th class="text-left p-3">Slug</th><th class="text-left p-3">Nombre</th><th class="text-left p-3">Facts</th><th class="text-left p-3">Pending</th><th></th></tr>
    </thead>
    <tbody>
    {% for kb in kbs %}
      <tr class="border-t border-slate-100 hover:bg-slate-50">
        <td class="p-3 font-mono">{{kb.slug}}</td>
        <td class="p-3">{{kb.name}} <div class="text-xs text-slate-500">{{kb.description or ''}}</div></td>
        <td class="p-3">{{kb.counts.active}}</td>
        <td class="p-3 {% if kb.counts.pending %}text-amber-600 font-semibold{% endif %}">{{kb.counts.pending}}</td>
        <td class="p-3 text-right"><a href="/kbs/{{kb.slug}}" class="text-orange-600 hover:underline">Abrir →</a></td>
      </tr>
    {% else %}
      <tr><td colspan="5" class="p-6 text-center text-slate-500">No hay KBs todavía.</td></tr>
    {% endfor %}
    </tbody>
  </table>
</div>

<div class="bg-white rounded-lg border border-slate-200 shadow-sm p-5 max-w-md">
  <h2 class="font-semibold mb-3">Nueva KB</h2>
  <form hx-post="/api/kbs" hx-on::after-request="if(event.detail.successful) window.location.reload()">
    <label class="block text-xs text-slate-500 mt-2">Slug (kebab-case)</label>
    <input name="slug" required pattern="[a-z0-9-]+" class="w-full border border-slate-300 rounded px-2 py-1 text-sm">
    <label class="block text-xs text-slate-500 mt-2">Nombre</label>
    <input name="name" required class="w-full border border-slate-300 rounded px-2 py-1 text-sm">
    <label class="block text-xs text-slate-500 mt-2">Descripción (corta, para que el clasificador sepa cuándo usarla)</label>
    <textarea name="description" rows="2" class="w-full border border-slate-300 rounded px-2 py-1 text-sm"></textarea>
    <button class="mt-3 bg-orange-600 hover:bg-orange-700 text-white text-sm font-semibold px-3 py-1.5 rounded">Crear</button>
  </form>
</div>
{% endblock %}
