<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Phoenix v2{% endblock %}</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🔥%3C/text%3E%3C/svg%3E">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/htmx.org@2.0.3" integrity="sha384-0895/pl2MU10Hqc6jd4RvrthNlDiE9U1tWmX7WRESftEDRosgxNsQG/Ze9YMRzHq" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
  body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  .badge { display:inline-flex; align-items:center; gap:.25rem; padding:.125rem .5rem; border-radius:9999px; font-size:.75rem; font-weight:600; }
  .badge-lurker { background:#e0e7ff; color:#3730a3; }
  .badge-proactive { background:#dcfce7; color:#166534; }
  .badge-on_command_only { background:#fef3c7; color:#92400e; }
  .badge-connected { background:#dcfce7; color:#166534; }
  .badge-pairing { background:#fef3c7; color:#92400e; }
  .badge-disconnected { background:#fee2e2; color:#991b1b; }
  .badge-connecting { background:#dbeafe; color:#1e40af; }
</style>
</head>
<body class="bg-slate-50 text-slate-800">
<nav class="bg-white border-b border-slate-200 sticky top-0 z-10">
  <div class="max-w-6xl mx-auto px-6 py-3 flex items-center gap-6">
    <a href="/" class="font-bold text-lg text-orange-600">🔥 Phoenix</a>
    <a href="/setup" class="text-sm hover:text-orange-600">Setup WhatsApp</a>
    <a href="/groups" class="text-sm hover:text-orange-600">Grupos</a>
    <a href="/kbs" class="text-sm hover:text-orange-600">Knowledge bases</a>
    <a href="/audit" class="text-sm hover:text-orange-600">Audit</a>
    <a href="/settings" class="text-sm hover:text-orange-600">Settings</a>
    <span id="wa-state-pill" class="ml-auto text-xs" hx-get="/_partials/wa-state" hx-trigger="load, every 10s" hx-swap="innerHTML">…</span>
  </div>
</nav>
<main class="max-w-6xl mx-auto px-6 py-6">
{% block content %}{% endblock %}
</main>
{% block scripts %}{% endblock %}
</body>
</html>
