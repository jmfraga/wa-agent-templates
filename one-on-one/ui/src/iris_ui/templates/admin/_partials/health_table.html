<div class="rounded-lg border bg-white shadow-sm overflow-hidden">
  <table class="w-full text-sm">
    <thead class="bg-slate-50 text-left text-xs uppercase text-slate-500">
      <tr>
        <th class="px-4 py-2">Componente</th>
        <th class="px-4 py-2">URL</th>
        <th class="px-4 py-2">Status</th>
        <th class="px-4 py-2">Ultimo check</th>
        <th class="px-4 py-2"></th>
      </tr>
    </thead>
    <tbody>
      {% for c in components %}
        <tr class="border-t">
          <td class="px-4 py-2 font-medium">{{ c.get('name') }}</td>
          <td class="px-4 py-2 font-mono text-xs text-slate-600">{{ c.get('url') or '-' }}</td>
          <td class="px-4 py-2">
            {% if c.get('ok') %}
              <span class="inline-flex items-center gap-1 text-emerald-700">
                <span class="w-2 h-2 rounded-full bg-emerald-500"></span> OK
              </span>
            {% else %}
              <span class="inline-flex items-center gap-1 text-rose-700">
                <span class="w-2 h-2 rounded-full bg-rose-500"></span>
                {{ c.get('error') or 'DOWN' }}
              </span>
            {% endif %}
          </td>
          <td class="px-4 py-2 text-xs text-slate-500">{{ c.get('last_check') or '-' }}</td>
          <td class="px-4 py-2 text-right">
            <button hx-post="/admin/health/probe/{{ c.get('name') }}"
                    hx-target="#health-root"
                    hx-swap="outerHTML"
                    class="text-xs text-slate-700 underline">Probar</button>
          </td>
        </tr>
      {% else %}
        <tr><td colspan="5" class="px-4 py-3 text-slate-400 italic">sin componentes registrados</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
