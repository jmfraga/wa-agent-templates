{% if items %}
{% for c in items %}
{% set kind = c.kind or 'otro' %}
{% set emoji = {'owner':'👑','paciente':'🩺','prospecto_curso':'🎓','colega':'🧑‍⚕️','asesoria':'💼','amigo':'🤝','familia':'👨‍👩‍👦','otro':'📩'} %}
<button type="button"
        data-add-target
        data-contact-id="{{ c.id }}"
        data-contact-name="{{ c.name or c.phone }}"
        data-contact-phone="{{ c.phone }}"
        class="w-full text-left px-3 py-2 hover:bg-slate-100 flex items-center gap-2 text-sm border-b border-slate-100 last:border-b-0">
  <span>{{ emoji.get(kind, '📩') }}</span>
  <span class="font-medium">{{ c.name or '(sin nombre)' }}</span>
  <span class="text-xs text-slate-400 font-mono">+{{ c.phone }}</span>
  <span class="ml-auto text-xs text-slate-400">{{ kind }}</span>
</button>
{% endfor %}
{% endif %}
