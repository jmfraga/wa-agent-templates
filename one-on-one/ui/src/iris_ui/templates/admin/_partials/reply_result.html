{% if result.get('ok') %}
  <div class="rounded-md bg-emerald-50 border border-emerald-200 text-emerald-800 text-sm p-2">
    OK · ticket {{ result.get('ticket_id') or ticket_id }} → {{ result.get('status') }}
  </div>
{% else %}
  <div class="rounded-md bg-rose-50 border border-rose-200 text-rose-800 text-sm p-2">
    Error: {{ result.get('error') or 'fallo el envio' }}
  </div>
{% endif %}
